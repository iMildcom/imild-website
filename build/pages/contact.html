<div class="grid2" style="align-items:start;">
  <div>
    <div class="stamp" data-i18n="contact.stamp">Sag Hallo</div>
    <h1 class="big" data-i18n="contact.h1">Kon<em>takt.</em></h1>
    <p class="lead" data-i18n="contact.lead">Presse, Partnerschaften, Support oder einfach eine gute Idee — wir lesen alles. Antwort meist in &lt; 24 Stunden.</p>
    <div class="underline"></div>
    <div style="margin-block-start:26px;display:flex;flex-direction:column;gap:9px;">
      <div class="crow glass"><span class="cico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></span> <span data-i18n="contact.c1">Allgemein &amp; Support</span> — <b>s@imild.com</b></div>
      <div class="crow glass"><span class="cico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 5h13v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/><path d="M17 8h3v10a2 2 0 0 1-2 2M7 9h7M7 13h7M7 17h4"/></svg></span> <span data-i18n="contact.c2">Presse</span> — <b>presse@imild.com</b></div>
      <div class="crow glass"><span class="cico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v18M7 21h10M5 7h14M5 7l-2.3 5.5a2.8 2.8 0 0 0 4.6 0zM19 7l-2.3 5.5a2.8 2.8 0 0 0 4.6 0z"/></svg></span> <span data-i18n="contact.c3">Legal &amp; DMCA</span> — <b>i@imild.com</b></div>
      <div class="crow glass"><span class="cico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 21s7-6.2 7-11a7 7 0 1 0-14 0c0 4.8 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span> iMild LLC · 32648 International Blvd Ste 301 #285 · Oakland, CA 94601, USA</div>
    </div>
  </div>
  <form class="glass" style="padding:24px;" id="contactform">
    <div class="field">
      <label for="cf-name" data-i18n="contact.f.name">Name</label>
      <input id="cf-name" name="name" required data-i18n-ph="contact.f.name.ph" placeholder="Dein Name">
    </div>
    <div class="field">
      <label for="cf-mail" data-i18n="contact.f.mail">E-Mail</label>
      <input id="cf-mail" name="email" type="email" required data-i18n-ph="contact.f.mail.ph" placeholder="du@beispiel.com">
    </div>
    <div class="field">
      <label for="cf-topic" data-i18n="contact.f.topic">Thema</label>
      <input id="cf-topic" name="topic" data-i18n-ph="contact.f.topic.ph" placeholder="Worum geht's?">
    </div>
    <div class="field">
      <label for="cf-msg" data-i18n="contact.f.msg">Nachricht</label>
      <textarea id="cf-msg" name="message" rows="5" required data-i18n-ph="contact.f.msg.ph" placeholder="Schreib uns…"></textarea>
    </div>
    <button class="btn" type="submit" style="display:block;width:100%;" data-i18n="contact.f.send">Nachricht senden</button>
  </form>
</div>
